[advisories]
ignore = [
    # fxhash — unmaintained but no security issues; transitive dep of scraper → selectors
    "RUSTSEC-2025-0057",
    # number_prefix — unmaintained but no security issues; transitive dep of indicatif
    "RUSTSEC-2025-0119",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
